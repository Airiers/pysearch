<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{value}} - PySearch</title>
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style-commun.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      src="{{ url_for('static', filename='settings.js') }}"
      defer
    ></script>
    <script src="{{ url_for('static', filename='icons.js') }}" defer></script>
    <script
      type="module"
      src="{{ url_for('static', filename='claude.js') }}"
      defer
    ></script>
    <style>
      article {
        width: 720px;
      }
      .main {
        margin-left: -150px;
        display: flex;
        justify-content: center;
      }
      .loading {
        color: #fff;
      }
    </style>
  </head>
  <body data-theme="dark">
    <div class="head">
      <div class="header">
        <a href="/">
          <img
            class="python-logo"
            src="{{ url_for('static', filename='python-powered.svg') }}"
            alt="Python Logo"
            width="80px"
        /></a>
        <form action="/search" method="GET" class="searchbar">
          <input
            autocomplete="off"
            value="{{value}}"
            type="text"
            name="q"
            id="query"
            placeholder="Rechercher..."
          />
          <div class="searches">
            <button type="submit">
              <i title="Rechercher" class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button type="button" id="claude">
              <img
                title="Rechercher avec Claude"
                src="{{ url_for('static', filename='claude.svg') }}"
                alt="Claude Logo"
                width="20px"
                style="cursor: pointer"
              />
            </button>
          </div>
        </form>
        <i class="fa-solid fa-gear settings"></i>
        <div class="modal" id="settingsModal">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Paramètres</h2>
            <div class="param theme">
              <i class="fa-solid fa-sun"></i>
              <p id="theme">Thème sombre</p>
            </div>
            <div class="param linkto">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
              <p id="linkto">Nouvel onglet</p>
            </div>
          </div>
        </div>
      </div>
      <div class="mode">
        <ul>
          <li>
            <a class="lien active" href="/search?q={{value}}">Web</a>
          </li>
          <li>
            <a class="lien" href="/images?q={{value}}">Images</a>
          </li>
          <li>
            <a class="lien" href="/actus?q={{value}}">Actualités</a>
          </li>
        </ul>
      </div>
    </div>
    <div id="loading-indicator" class="loading">
      <div class="spinner"></div>
      <p>Recherche en cours...</p>
    </div>
    <div class="main index" id="results-container" style="display: none">
      <div class="ddg"></div>
      <div class="bing"></div>
    </div>
    <script>
      let ddgLoaded = false;
      let bingLoaded = false;

      function checkAllLoaded() {
        if (ddgLoaded && bingLoaded) {
          document.getElementById("loading-indicator").style.display = "none";
          document.getElementById("results-container").style.display = "flex";
          loadLazyImages();
        }
      }

      function loadLazyImages() {
        const lazyImages = document.querySelectorAll("img[data-src]");
        lazyImages.forEach((img) => {
          img.src = img.getAttribute("data-src");
          img.removeAttribute("data-src");
        });
      }

      async function loadResults() {
        const query = new URLSearchParams(window.location.search).get("q");

        // Charger DDG
        fetch(`/api/search/ddg?q=${encodeURIComponent(query)}`)
          .then((res) => res.json())
          .then((data) => {
            renderDDGResults(data);
            ddgLoaded = true;
            checkAllLoaded();
          })
          .catch((err) => {
            console.error("Erreur DDG:", err);
            ddgLoaded = true;
            checkAllLoaded();
          });

        // Charger Bing
        fetch(`/api/search/bing?q=${encodeURIComponent(query)}`)
          .then((res) => res.json())
          .then((data) => {
            renderBingResults(data);
            bingLoaded = true;
            checkAllLoaded();
          })
          .catch((err) => {
            console.error("Erreur Bing:", err);
            bingLoaded = true;
            checkAllLoaded();
          });
      }

      function renderDDGResults(results) {
        const container = document.querySelector(".ddg");
        results.forEach((r) => {
          const article = document.createElement("article");
          article.innerHTML = `
            <h2 title="${r[4]}">
              <div class="icon-wrapper">
                <img alt="icon" data-src="${r[3]}" width="30px" loading="lazy" class="lazy-logo">
              </div>
              <a target="_blank" class="title" href="${r[1]}">${r[0]}</a>
            </h2>
            <div class="description">
              <a target="_blank" class="description" href="${r[1]}">${r[2]}</a>
            </div>
          `;
          container.appendChild(article);
        });
      }

      function renderBingResults(results) {
        const container = document.querySelector(".bing");
        results.forEach((r) => {
          const article = document.createElement("article");
          article.innerHTML = `
            <h2 title="${r[4]}">
              <div class="icon-wrapper">
                <img alt="icon" data-src="${r[3]}" width="30px" loading="lazy" class="lazy-logo">
              </div>
              <a target="_blank" class="title" href="${r[1]}">${r[0]}</a>
            </h2>
            <div class="description">
              <a target="_blank" class="description" href="${r[1]}">${r[2]}</a>
            </div>
          `;
          container.appendChild(article);
        });
      }

      window.addEventListener("DOMContentLoaded", loadResults);
    </script>
  </body>
</html>
