<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{value}} - PySearch</title>
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style-images.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style-commun.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      /* Image normale */
      .thumbnail {
        width: 200px;
        cursor: pointer;
      }

      /* Fond sombre */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      /* Image agrandie */
      #overlay img {
        max-width: 90%;
        max-height: 90%;
        box-shadow: 0 0 20px black;
      }
    </style>
    <script
      src="{{ url_for('static', filename='settings.js') }}"
      defer
    ></script>
    <script
      type="module"
      src="{{ url_for('static', filename='claude.js') }}"
      defer
    ></script>
  </head>
  <body data-theme="dark">
    <div class="head">
      <div class="header">
        <a href="/">
          <img
            class="python-logo"
            src="{{ url_for('static', filename='python-powered.svg') }}"
            alt="Python Logo"
            width="80px"
        /></a>
        <form action="/search" method="GET" class="searchbar">
          <input
            autocomplete="off"
            value="{{value}}"
            type="text"
            name="q"
            id="query"
            placeholder="Rechercher..."
          />
          <div class="searches">
            <button type="submit">
              <i title="Rechercher" class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button type="button" id="claude">
              <img
                title="Rechercher avec Claude"
                src="{{ url_for('static', filename='claude.svg') }}"
                alt="Claude Logo"
                width="20px"
                style="cursor: pointer"
              />
            </button>
          </div>
        </form>
        <i class="fa-solid fa-gear settings"></i>
        <div class="modal" id="settingsModal">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Paramètres</h2>
            <div class="param theme">
              <i class="fa-solid fa-sun"></i>
              <p id="theme">Thème sombre</p>
            </div>
            <div class="param linkto">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
              <p id="linkto">Nouvel onglet</p>
            </div>
          </div>
        </div>
      </div>
      <div class="mode">
        <ul>
          <li>
            <a class="lien" href="/search?q={{value}}">Web</a>
          </li>
          <li>
            <a class="lien active" href="/images?q={{value}}">Images</a>
          </li>
          <li>
            <a class="lien" href="/actus?q={{value}}">Actualités</a>
          </li>
        </ul>
      </div>
    </div>
    <div class="main">
      {% for result in results %}
      <article>
        <img src="{{result}}" alt="{{result}}" onclick="openImage(this)" />
      </article>
      {% endfor %}
    </div>

    <!-- Overlay unique pour toutes les images -->
    <div id="overlay" onclick="closeImage()">
      <img id="bigImage" />
    </div>
    <script>
      function openImage(img) {
        document.getElementById("overlay").style.display = "flex";
        document.getElementById("bigImage").src = img.src;
      }

      function closeImage() {
        document.getElementById("overlay").style.display = "none";
      }
    </script>
  </body>
</html>
