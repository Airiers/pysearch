<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{value}} - PySearch</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style-commun.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      src="{{ url_for('static', filename='settings.js') }}"
      defer
    ></script>
    <script src="{{ url_for('static', filename='icons.js') }}" defer></script>
    <script
      type="module"
      src="{{ url_for('static', filename='claude.js') }}"
      defer
    ></script>
    <style>
      article {
        width: 720px;
      }
      .main {
        margin-left: -150px;
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body data-theme="dark">
    <div class="head">
      <div class="header">
        <a href="/">
          <img
            class="python-logo"
            src="{{ url_for('static', filename='python-powered.svg') }}"
            alt="Python Logo"
            width="80px"
        /></a>
        <form action="/search" method="GET" class="searchbar">
          <input
            autocomplete="off"
            value="{{value}}"
            type="text"
            name="q"
            id="query"
            placeholder="Rechercher..."
          />
          <div class="searches">
            <button type="submit">
              <i title="Rechercher" class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button type="button" id="claude">
              <img
                title="Rechercher avec Claude"
                src="{{ url_for('static', filename='claude.svg') }}"
                alt="Claude Logo"
                width="20px"
                style="cursor: pointer"
              />
            </button>
          </div>
        </form>
        <i class="fa-solid fa-gear settings"></i>
        <div class="modal" id="settingsModal">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Paramètres</h2>
            <div class="param theme">
              <i class="fa-solid fa-sun"></i>
              <p id="theme">Thème sombre</p>
            </div>
            <div class="param linkto">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
              <p id="linkto">Nouvel onglet</p>
            </div>
          </div>
        </div>
      </div>
      <div class="mode">
        <ul>
          <li>
            <a class="lien active" href="/search?q={{value}}">Web</a>
          </li>
          <li>
            <a class="lien" href="/images?q={{value}}">Images</a>
          </li>
          <li>
            <a class="lien" href="/actus?q={{value}}">Actualités</a>
          </li>
        </ul>
      </div>
    </div>
    <div class="main index">
      <div class="ddg">
        {% for result in results_ddg %}
        <article>
          <h2 title="{{ result[4] }}">
            <div class="icon-wrapper">
              <img
                alt="icon"
                data-src="{{ result[3] }}"
                width="30px"
                loading="lazy"
                class="lazy-logo"
              />
            </div>
            <a target="_blank" class="title" href="{{ result[1] }}"
              >{{ result[0] }}</a
            >
          </h2>
          <div class="description">
            <a target="_blank" class="description" href="{{ result[1] }}"
              >{{ result[2] }}</a
            >
          </div>
        </article>
        {% endfor %}
      </div>
      <div class="bing">
        {% for result in results_bing %}
        <article>
          <h2 title="{{ result[4] }}">
            <div class="icon-wrapper">
              <img
                alt="icon"
                data-src="{{ result[3] }}"
                width="30px"
                loading="lazy"
                class="lazy-logo"
              />
            </div>
            <a target="_blank" class="title" href="{{ result[1] }}"
              >{{ result[0] }}</a
            >
          </h2>
          <div class="description">
            <a target="_blank" class="description" href="{{ result[1] }}"
              >{{ result[2] }}</a
            >
          </div>
        </article>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
